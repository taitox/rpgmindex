<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RPGMINDEX — RPG Maker Games Index</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/tokens.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- LOADING OVERLAY -->
<div class="loading-overlay hidden" id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-message" data-i18n="loading"></div>
</div>

<!-- TOP BAR -->
<header class="topbar">
  <a class="logo" href="#" onclick="return false">
    <span class="logo-icon">♞</span>
    <div class="logo-text">
      <span class="logo-title">RPGMINDEX</span>
      <span class="logo-sub" data-i18n="sub"></span>
    </div>
  </a>
  <div class="topbar-right">
    <select id="lang-select" class="lang-select" onchange="setLang(this.value)">
      <option value="en">🇺🇸 EN-US</option>
      <option value="pt" selected>🇧🇷 PT-BR</option>
    </select>
    <div class="toggle-pill">
      <button onclick="setTheme('light')" id="theme-light-button" class="on">☀️</button>
      <button onclick="setTheme('dark')"  id="theme-dark-button">🌙</button>
    </div>
    <button class="button-base" onclick="openModal('contact-modal')">
      <span data-i18n="contact"></span>
    </button>
    <button class="icon-button" id="admin-button" onclick="adminClick()" title="Admin">⚙️</button>
  </div>
</header>

<!-- ADMIN BAR — sticky just below the topbar -->
<div id="admin-bar">
  <span class="admin-bar-left">
    🔐 <span data-i18n="adminmode"></span> · <span id="admin-email-label"></span>
  </span>
  <div class="admin-bar-right">
    <button data-i18n="addgame"  id="admin-add-button"    onclick="openEdit(null)"></button>
    <button data-i18n="logout"   id="admin-logout-button" onclick="doLogout()"></button>
  </div>
</div>

<!-- MAIN -->
<main id="main-view">

  <!-- CONTROL BAR -->
  <div class="control-bar">
    <div class="control-left">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search" type="search" data-i18n-ph="search" oninput="onSearch(this.value)">
      </div>
      <button class="button-base" id="advanced-search-button" onclick="toggleAdvancedSearch()"></button>
      <!-- Cards sort — visible only when body.view-cards; hidden on mobile -->
      <div class="sort-control" id="control-sort-wrapper">
        <span class="sort-prefix" data-i18n="sortby"></span>
        <select id="cards-sort" onchange="onCardSort(this.value)">
          <option value="title">Título A→Z</option>
          <option value="title-d">Título Z→A</option>
          <option value="year">Ano ↑</option>
          <option value="year-d">Ano ↓</option>
          <option value="developer">Dev A→Z</option>
        </select>
      </div>
    </div>
    <div class="control-right">
      <div class="columns-wrapper">
        <button class="button-base" id="columns-button" onclick="toggleColumnsMenu()"></button>
        <div class="columns-menu" id="columns-menu"></div>
      </div>
      <div class="view-toggle">
        <button class="on" data-i18n="compact" id="view-compact" onclick="setView('compact')"></button>
        <button data-i18n="cards"   id="view-cards"   onclick="setView('cards')"></button>
      </div>
    </div>
  </div>

  <!-- ADVANCED SEARCH PANEL — no label titles above inputs -->
  <div class="advanced-panel" id="advanced-panel">
    <div class="advanced-panel-header">
      <span class="advanced-panel-title" data-i18n="advsearch"></span>
      <button class="advanced-panel-close" onclick="tryCloseAdvanced()" aria-label="Fechar">✕</button>
    </div>
    <div class="advanced-panel-body">

      <div class="adv-control">
        <div class="ms-wrapper">
          <button class="ms-trigger" onclick="toggleDropdown('ms-version-dropdown')">
            <span id="ms-version-label"></span><span class="ms-arrow">▾</span>
          </button>
          <div class="ms-dropdown" id="ms-version-dropdown"></div>
        </div>
      </div>

      <div class="adv-control">
        <div class="ms-wrapper">
          <button class="ms-trigger" onclick="toggleDropdown('ms-country-dropdown')">
            <span id="ms-country-label"></span><span class="ms-arrow">▾</span>
          </button>
          <div class="ms-dropdown" id="ms-country-dropdown"></div>
        </div>
      </div>

      <div class="adv-control adv-control-tags">
        <div class="adv-tags-row">
          <div class="ms-wrapper">
            <button class="ms-trigger" onclick="toggleDropdown('ms-tags-dropdown')">
              <span id="ms-tags-label"></span><span class="ms-arrow">▾</span>
            </button>
            <div class="ms-dropdown" id="ms-tags-dropdown"></div>
          </div>
          <div class="mode-toggle">
            <button id="adv-mode-or"  onclick="setTagMode('or')">OR</button>
            <button id="adv-mode-and" class="on" onclick="setTagMode('and')">AND</button>
          </div>
        </div>
      </div>

      <!-- Clear all — inline at the same height as the dropdowns -->
      <div class="adv-control adv-control-clear">
        <button class="clear-button" data-i18n="clearall" id="adv-clear-btn" onclick="clearAdvancedFilters()"></button>
      </div>

    </div>
    <div class="advanced-chips-row" id="advanced-chips-row" style="display:none"></div>
  </div>

  <!-- RESULTS COUNT -->
  <div class="results-count" id="results-count"></div>

  <!-- TABLE VIEW -->
  <div id="table-view">
    <div class="table-wrapper">
      <div class="table-scroll">
        <table>
          <thead><tr id="table-header-row"></tr></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- CARDS VIEW -->
  <div id="cards-view">
    <!-- Mobile-only sort bar -->
    <div class="cards-toolbar">
      <div class="sort-control" style="flex:1">
        <span class="sort-prefix" data-i18n="sortby"></span>
        <select id="cards-sort-mobile" onchange="onCardSort(this.value)" style="flex:1">
          <option value="title">Título A→Z</option>
          <option value="title-d">Título Z→A</option>
          <option value="year">Ano ↑</option>
          <option value="year-d">Ano ↓</option>
          <option value="developer">Dev A→Z</option>
        </select>
      </div>
    </div>
    <div class="cards-grid" id="cards-grid"></div>
  </div>

</main>

<!-- SCREENSHOT TOOLTIP -->
<div id="tooltip">
  <img id="tooltip-image" src="" alt="Screenshot"/>
  <div class="tooltip-fallback" data-i18n="noss" id="tooltip-fallback"></div>
  <div id="tooltip-title"></div>
</div>

<!-- GAME DETAIL MODAL -->
<div class="modal-overlay" id="game-detail-modal">
  <div class="modal-content game-detail-content">
    <button class="game-detail-close" onclick="closeModal('game-detail-modal');S.activeModalGameId=null" aria-label="Fechar">×</button>
    <div class="game-detail-screenshot-wrap">
      <img id="game-detail-screenshot" src="" alt="Screenshot"/>
      <div id="game-detail-screenshot-fallback"></div>
    </div>
    <div class="game-detail-body">
      <div class="game-detail-header">
        <div class="game-detail-title" id="game-detail-title"></div>
        <div class="game-detail-id"    id="game-detail-id"></div>
      </div>
      <div class="game-detail-meta"   id="game-detail-meta"></div>
      <div class="game-detail-tags"   id="game-detail-tags"></div>
      <div class="game-detail-footer" id="game-detail-footer"></div>
    </div>
  </div>
</div>

<!-- CONFIRM ABANDON SEARCH — .no-click-close prevents accidental dismissal -->
<div class="modal-overlay no-click-close" id="confirm-clear-modal">
  <div class="modal-content">
    <div class="modal-title"    data-i18n="confirmclear"></div>
    <div class="modal-subtitle" data-i18n="confirmclearsub"></div>
    <div class="modal-actions">
      <button class="button-secondary" data-i18n="confirmkeep"     onclick="keepAndClose()"></button>
      <button class="button-primary"   data-i18n="confirmclearbtn" onclick="confirmClearClose()"></button>
    </div>
  </div>
</div>

<!-- ADMIN LOGIN MODAL -->
<div class="modal-overlay" id="login-modal">
  <div class="modal-content">
    <div class="modal-title"    data-i18n="adminlogin"></div>
    <div class="modal-subtitle" data-i18n="adminsub"></div>
    <div class="field">
      <label data-i18n="email"></label>
      <input id="login-email" type="email" placeholder="admin@example.com"/>
    </div>
    <div class="field">
      <label data-i18n="pass"></label>
      <input id="login-password" type="password"/>
    </div>
    <div class="modal-actions">
      <button class="button-secondary" data-i18n="cancel" onclick="closeModal('login-modal')"></button>
      <button class="button-primary"   data-i18n="login"  onclick="doLogin()"></button>
    </div>
    <div class="login-error" id="login-error">Credenciais inválidas.</div>
  </div>
</div>

<!-- EDIT / ADD GAME MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal-content large">
    <div class="modal-title" id="edit-modal-title"></div>
    <input type="hidden" id="edit-game-id"/>

    <div class="field-row">
      <div class="field">
        <label data-i18n="edtitle"></label>
        <input id="edit-game-title" type="text" placeholder="Nome do jogo"/>
        <div class="login-error" id="edit-title-error" style="display:none;text-align:left"></div>
      </div>
      <div class="field">
        <label data-i18n="eddev"></label>
        <input id="edit-game-developer" type="text" list="developer-list" autocomplete="off" placeholder="Dev ou estúdio"/>
        <datalist id="developer-list"></datalist>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label data-i18n="edver"></label>
        <select id="edit-game-version"></select>
      </div>
      <div class="field">
        <label data-i18n="edyr"></label>
        <input id="edit-game-year" type="number" min="1900" max="2099" placeholder="AAAA"
               oninput="if(this.value.length>4)this.value=this.value.slice(0,4)"/>
        <div class="login-error" id="edit-year-error" style="display:none;text-align:left"></div>
      </div>
    </div>

    <div class="field">
      <label data-i18n="edcountry"></label>
      <input id="edit-game-country" type="text" list="country-datalist" data-i18n-ph="countryph" autocomplete="off"/>
      <datalist id="country-datalist"></datalist>
    </div>

    <div class="field">
      <div class="field-label" data-i18n="edss"></div>
      <div class="screenshot-mode-toggle">
        <button type="button" id="screenshot-url-button"  class="on" onclick="setScreenshotMode('url')">
          <span data-i18n="ssurl"></span>
        </button>
        <button type="button" id="screenshot-file-button" onclick="setScreenshotMode('file')">
          <span data-i18n="ssupload"></span>
        </button>
      </div>
      <input id="edit-screenshot-url"  type="url"  placeholder="https://…"/>
      <input id="edit-screenshot-file" type="file" accept="image/*" style="display:none"/>
    </div>

    <div class="field">
      <div class="field-label" data-i18n="eddl"></div>
      <div class="download-options">
        <div class="download-option">
          <input type="radio" name="download-type" id="download-available" value="available" onchange="toggleDownloadField()" checked/>
          <label for="download-available" data-i18n="avail"></label>
        </div>
        <div class="download-option">
          <input type="radio" name="download-type" id="download-unavailable" value="na" onchange="toggleDownloadField()"/>
          <label for="download-unavailable" data-i18n="na2"></label>
        </div>
      </div>
      <input id="edit-download-url" type="url" placeholder="https://…" style="margin-top:6px"/>
    </div>

    <div class="field">
      <div class="field-label" data-i18n="edtags"></div>
      <div class="edit-tag-ms" id="edit-tag-ms">
        <div class="edit-tag-input-row">
          <input type="text" id="edit-tag-input"
                 data-i18n-ph="tagph"
                 oninput="onEditTagInput(this.value)"
                 onkeydown="onEditTagKeydown(event)"
                 onfocus="renderEditTagDropdown(editForm.tagFilter)"
                 autocomplete="off"/>
          <span class="ms-arrow" onclick="toggleEditTagDropdown()" style="cursor:pointer;padding:0 4px">▾</span>
        </div>
        <div class="ms-dropdown" id="edit-tag-dropdown"></div>
        <div class="edit-tag-chips" id="edit-tag-chips"></div>
      </div>
      <div class="login-error" data-i18n="tagsrequired" id="edit-tag-error" style="display:none;text-align:left"></div>
    </div>

    <div class="modal-actions">
      <button class="button-secondary" data-i18n="cancel" onclick="closeModal('edit-modal')"></button>
      <button class="button-primary"   data-i18n="save"   onclick="saveGame()"></button>
    </div>
  </div>
</div>

<!-- CONTACT MODAL -->
<div class="modal-overlay" id="contact-modal">
  <div class="modal-content">
    <div class="modal-title"    data-i18n="contacttitle"></div>
    <div class="modal-subtitle" data-i18n="contactsub"></div>
    <div class="field">
      <label data-i18n="contactname"></label>
      <input id="contact-name" type="text" placeholder="Seu nome"/>
    </div>
    <div class="field">
      <label data-i18n="contactemail"></label>
      <input id="contact-email" type="email" placeholder="seu@email.com"/>
    </div>
    <div class="field">
      <label data-i18n="contactmsg"></label>
      <textarea id="contact-message" placeholder="…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="button-secondary" data-i18n="cancel"      onclick="closeModal('contact-modal')"></button>
      <button class="button-primary"   data-i18n="contactsend" onclick="sendContact()"></button>
    </div>
  </div>
</div>

<!-- JS — order matters: data → state → i18n → helpers → render → admin → ui → app -->
<script src="js/supabase-client.js"></script>
<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/i18n.js"></script>
<script src="js/helpers.js"></script>
<script src="js/render.js"></script>
<script src="js/admin.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
