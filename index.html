<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RPGMINDEX — RPG Maker Games Index</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link rel="preconnect" href="https://fonts.bunny.net" crossorigin>
  <link href="https://fonts.bunny.net/css2?family=Inter:400,500,600,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="loading-overlay hidden" id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-message" data-i18n="loading"></div>
</div>

<header class="topbar">
  <a class="logo" href="#" onclick="return false">
    <span class="logo-icon">♞</span>
    <div class="logo-text">
      <span class="logo-title">RPGMINDEX</span>
      <span class="logo-sub" data-i18n="sub"></span>
    </div>
  </a>
  <div class="topbar-right">
    <select id="lang-select" class="lang-select" onchange="setLang(this.value)">
      <option value="en">🇺🇸 EN-US</option>
      <option value="pt" selected>🇧🇷 PT-BR</option>
    </select>
    <div class="toggle-pill">
      <button onclick="setTheme('light')" id="theme-light-button" class="on">☀️</button>
      <button onclick="setTheme('dark')"  id="theme-dark-button">🌙</button>
    </div>
    <button class="button-base" onclick="openModal('contact-modal')"><span data-i18n="contact"></span></button>
    <button class="icon-button" id="admin-button" onclick="adminClick()" title="Admin">⚙️</button>
  </div>
</header>

<div id="admin-bar">
  <span class="admin-bar-left">🔐 <span data-i18n="adminmode"></span> · <span id="admin-email-label"></span></span>
  <div class="admin-bar-right">
    <button data-i18n="addgame"    onclick="openEdit(null)"></button>
    <button data-i18n="managever"  onclick="openManageVersions()"></button>
    <button data-i18n="managetags" onclick="openManageTags()"></button>
    <button data-i18n="logout"     onclick="doLogout()"></button>
  </div>
</div>

<main id="main-view">

  <!-- WARNING DIV — tracker for big destructive actions -->
  <div id="warning-div" style="display:none">
    <div class="warning-header">
      <span class="warning-title">⚠️ <span data-i18n="pendingactions"></span></span>
      <button id="warning-toggle-btn" onclick="toggleWarningExpand()">▾</button>
    </div>
    <div id="warning-actions-list"></div>
  </div>

  <div class="control-bar">
    <div class="control-left">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search" type="search" data-i18n-ph="search" oninput="onSearch(this.value)">
      </div>
      <button class="button-base" id="advanced-search-button" onclick="toggleAdvancedSearch()"></button>
      <div class="sort-control" id="control-sort-wrapper">
        <span class="sort-prefix" data-i18n="sortby"></span>
        <select id="cards-sort" onchange="onCardSort(this.value)">
          <option value="title">Título A→Z</option>
          <option value="title-d">Título Z→A</option>
          <option value="year">Ano ↑</option>
          <option value="year-d">Ano ↓</option>
          <option value="developer">Dev A→Z</option>
        </select>
      </div>
    </div>
    <div class="control-right">
      <div class="columns-wrapper" id="columns-wrapper-el">
        <button class="button-base" id="columns-button" onclick="toggleColumnsMenu()"></button>
        <div class="columns-menu" id="columns-menu"></div>
      </div>
      <div class="view-toggle">
        <button class="on" data-i18n="compact" id="view-compact" onclick="setView('compact')"></button>
        <button data-i18n="cards"   id="view-cards"   onclick="setView('cards')"></button>
      </div>
    </div>
  </div>

  <!-- ADVANCED SEARCH -->
  <div class="advanced-panel" id="advanced-panel">
    <div class="advanced-panel-header">
      <span class="advanced-panel-title" data-i18n="advsearch"></span>
      <button class="advanced-panel-close" onclick="tryCloseAdvanced()">✕</button>
    </div>
    <div class="advanced-panel-body">
      <div class="adv-control">
        <div class="ms-wrapper">
          <button class="ms-trigger" onclick="toggleDropdown('ms-version-dropdown')">
            <span id="ms-version-label"></span><span class="ms-arrow">▾</span>
          </button>
          <div class="ms-dropdown" id="ms-version-dropdown"></div>
        </div>
      </div>
      <div class="adv-control">
        <div class="ms-wrapper">
          <button class="ms-trigger" onclick="toggleDropdown('ms-country-dropdown')">
            <span id="ms-country-label"></span><span class="ms-arrow">▾</span>
          </button>
          <div class="ms-dropdown" id="ms-country-dropdown"></div>
        </div>
      </div>
      <div class="adv-control adv-control-tags">
        <div class="adv-tags-row">
          <div class="ms-wrapper">
            <button class="ms-trigger" onclick="toggleDropdown('ms-tags-dropdown')">
              <span id="ms-tags-label"></span><span class="ms-arrow">▾</span>
            </button>
            <div class="ms-dropdown" id="ms-tags-dropdown"></div>
          </div>
          <div class="mode-toggle">
            <button id="adv-mode-or"  onclick="setTagMode('or')">OR</button>
            <button id="adv-mode-and" class="on" onclick="setTagMode('and')">AND</button>
          </div>
          <span class="tags-only-label" data-i18n="tagsonly"></span>
        </div>
      </div>
      <div class="adv-control adv-control-clear">
        <button class="clear-button" data-i18n="clearall" onclick="clearAdvancedFilters()"></button>
      </div>
    </div>
    <div class="advanced-chips-row" id="advanced-chips-row" style="display:none"></div>
  </div>

  <!-- DEVELOPER PANEL -->
  <div id="dev-panel" style="display:none"></div>

  <div class="results-count" id="results-count"></div>

  <div id="table-view">
    <div class="table-wrapper"><div class="table-scroll">
      <table>
        <thead><tr id="table-header-row"></tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div></div>
  </div>

  <div id="cards-view">
    <div class="cards-toolbar">
      <div class="sort-control" style="flex:1">
        <span class="sort-prefix" data-i18n="sortby"></span>
        <select id="cards-sort-mobile" onchange="onCardSort(this.value)" style="flex:1">
          <option value="title">Título A→Z</option>
          <option value="title-d">Título Z→A</option>
          <option value="year">Ano ↑</option>
          <option value="year-d">Ano ↓</option>
          <option value="developer">Dev A→Z</option>
        </select>
      </div>
    </div>
    <div class="cards-grid" id="cards-grid"></div>
  </div>

</main>

<!-- TOOLTIP -->
<div id="tooltip">
  <img id="tooltip-image" src="" alt=""/>
  <div class="tooltip-fallback" data-i18n="noss" id="tooltip-fallback"></div>
  <div id="tooltip-title"></div>
</div>

<!-- GAME DETAIL MODAL -->
<div class="modal-overlay" id="game-detail-modal">
  <div class="modal-content game-detail-content">
    <button class="game-detail-close" onclick="closeModal('game-detail-modal');S.activeModalGameId=null">×</button>
    <div class="game-detail-screenshot-wrap">
      <img id="game-detail-screenshot" src="" alt=""/>
      <div id="game-detail-screenshot-fallback"></div>
    </div>
    <div class="game-detail-body">
      <div class="game-detail-header">
        <div class="game-detail-title" id="game-detail-title"></div>
        <div class="game-detail-id"    id="game-detail-id"></div>
      </div>
      <div id="game-detail-meta"></div>
      <div id="game-detail-tags"></div>
      <div class="game-detail-footer" id="game-detail-footer"></div>
    </div>
  </div>
</div>

<!-- CONFIRM ABANDON -->
<div class="modal-overlay no-click-close" id="confirm-clear-modal">
  <div class="modal-content">
    <div class="modal-title"    data-i18n="confirmclear"></div>
    <div class="modal-subtitle" data-i18n="confirmclearsub"></div>
    <div class="modal-actions">
      <button class="button-secondary" data-i18n="confirmkeep"     onclick="keepAndClose()"></button>
      <button class="button-primary"   data-i18n="confirmclearbtn" onclick="confirmClearClose()"></button>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div class="modal-overlay" id="login-modal">
  <div class="modal-content">
    <div class="modal-title"    data-i18n="adminlogin"></div>
    <div class="modal-subtitle" data-i18n="adminsub"></div>
    <div class="field">
      <input id="login-email" type="email" placeholder="admin@example.com" title="Email"/>
    </div>
    <div class="field">
      <input id="login-password" type="password" placeholder="Password" title="Password"/>
    </div>
    <div class="modal-actions">
      <button class="button-secondary" data-i18n="cancel" onclick="closeModal('login-modal')"></button>
      <button class="button-primary"   data-i18n="login"  onclick="doLogin()"></button>
    </div>
    <div class="login-error" id="login-error">Credenciais inválidas.</div>
  </div>
</div>

<!-- EDIT / ADD GAME -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal-content large">
    <div class="modal-title" id="edit-modal-title"></div>
    <input type="hidden" id="edit-game-id"/>

    <div class="field-row">
      <div class="field">
        <input id="edit-game-title" type="text" placeholder="Nome do jogo" data-i18n-ph="edtitle" title="Título"/>
        <div class="login-error" id="edit-title-error" style="display:none"></div>
      </div>
      <div class="field">
        <input id="edit-game-developer" type="text" list="developer-list" autocomplete="off"
               placeholder="Dev ou estúdio" title="Desenvolvedor"/>
        <datalist id="developer-list"></datalist>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <select id="edit-game-version" title="Versão RPG Maker"></select>
      </div>
      <div class="field">
        <input id="edit-game-year" type="number" min="1900" max="2099"
               placeholder="AAAA" title="Ano"
               oninput="if(this.value.length>4)this.value=this.value.slice(0,4)"/>
        <div class="login-error" id="edit-year-error" style="display:none"></div>
      </div>
    </div>

    <div class="field">
      <input id="edit-game-country" type="text" list="country-datalist"
             data-i18n-ph="countryph" autocomplete="off" title="País de Origem"/>
      <datalist id="country-datalist"></datalist>
    </div>

    <!-- Screenshot — single URL field + upload/delete button -->
    <div class="field">
      <div class="screenshot-field">
        <input id="edit-screenshot-url" type="url" placeholder="Screenshot URL…" title="Screenshot URL"/>
        <button type="button" id="screenshot-upload-btn" onclick="triggerScreenshotUpload()"></button>
        <input type="file" id="edit-screenshot-file-input" accept="image/*" style="display:none"
               onchange="handleScreenshotFile(this)"/>
      </div>
    </div>

    <div class="field">
      <div class="download-options">
        <div class="download-option">
          <input type="radio" name="download-type" id="download-available" value="available" onchange="toggleDownloadField()" checked/>
          <label for="download-available" data-i18n="avail"></label>
        </div>
        <div class="download-option">
          <input type="radio" name="download-type" id="download-unavailable" value="na" onchange="toggleDownloadField()"/>
          <label for="download-unavailable" data-i18n="na2"></label>
        </div>
      </div>
      <input id="edit-download-url" type="url" placeholder="https://…" style="margin-top:6px" title="URL de Download"/>
    </div>

    <div class="field">
      <div class="edit-tag-ms" id="edit-tag-ms">
        <div class="edit-tag-input-row">
          <input type="text" id="edit-tag-input" data-i18n-ph="tagph"
                 oninput="onEditTagInput(this.value)" onkeydown="onEditTagKeydown(event)"
                 onfocus="renderEditTagDropdown(editForm.tagFilter)" autocomplete="off" title="Tags"/>
          <span class="ms-arrow" onclick="toggleEditTagDropdown()" style="cursor:pointer;padding:0 4px">▾</span>
        </div>
        <div class="ms-dropdown" id="edit-tag-dropdown"></div>
        <div class="edit-tag-chips" id="edit-tag-chips"></div>
      </div>
      <div class="login-error" data-i18n="tagsrequired" id="edit-tag-error" style="display:none"></div>
    </div>

    <div class="modal-actions">
      <button class="button-secondary" data-i18n="cancel" onclick="closeModal('edit-modal')"></button>
      <button class="button-primary"   data-i18n="save"   onclick="saveGame()"></button>
    </div>
  </div>
</div>

<!-- MANAGE VERSIONS -->
<div class="modal-overlay" id="manage-versions-modal">
  <div class="modal-content large">
    <div class="modal-title" data-i18n="managever"></div>
    <div class="manage-add-row">
      <input id="new-ver-name"  class="manage-input" placeholder="RPG Maker MZ"/>
      <input id="new-ver-abbr"  class="manage-input" placeholder="RMMZ" style="width:90px"/>
      <button class="button-primary" data-i18n="addversion" onclick="addVersion()"></button>
    </div>
    <div id="versions-list" class="manage-list"></div>
    <div class="modal-actions">
      <button class="button-secondary" data-i18n="cancel" onclick="closeModal('manage-versions-modal')"></button>
    </div>
  </div>
</div>

<!-- MANAGE TAGS -->
<div class="modal-overlay" id="manage-tags-modal">
  <div class="modal-content large">
    <div class="modal-title" data-i18n="managetags"></div>
    <div class="manage-add-row">
      <input id="new-tag-name" class="manage-input" placeholder="Nova tag…"/>
      <button class="button-primary" data-i18n="addtag" onclick="addTag()"></button>
    </div>
    <div id="tags-list" class="manage-list"></div>
    <div class="modal-actions">
      <button class="button-secondary" data-i18n="cancel" onclick="closeModal('manage-tags-modal')"></button>
    </div>
  </div>
</div>

<!-- CONTACT -->
<div class="modal-overlay" id="contact-modal">
  <div class="modal-content">
    <div class="modal-title"    data-i18n="contacttitle"></div>
    <div class="modal-subtitle" data-i18n="contactsub"></div>
    <div class="field"><input id="contact-name"  type="text"  placeholder="Seu nome"/></div>
    <div class="field"><input id="contact-email" type="email" placeholder="seu@email.com"/></div>
    <div class="field"><textarea id="contact-message" placeholder="…"></textarea></div>
    <div class="modal-actions">
      <button class="button-secondary" data-i18n="cancel"      onclick="closeModal('contact-modal')"></button>
      <button class="button-primary"   data-i18n="contactsend" onclick="sendContact()"></button>
    </div>
  </div>
</div>

<script src="js/supabase-client.js"></script>
<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/i18n.js"></script>
<script src="js/helpers.js"></script>
<script src="js/render.js"></script>
<script src="js/admin.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
