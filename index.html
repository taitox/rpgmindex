<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RPGMINDEX — RPG Maker Games Index</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/tokens.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- GLOBAL SPINNER -->
<div id="global-spinner" class="hidden">
  <div class="global-spinner-inner"></div>
</div>

<!-- INITIAL LOADING OVERLAY -->
<div class="loading-overlay hidden" id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-message" data-i18n="loading"></div>
</div>

<!-- TOP BAR -->
<header class="topbar">
  <a class="logo" href="#games" onclick="navigateTo('games');return false">
    <span class="logo-icon">♞</span>
    <div class="logo-text">
      <span class="logo-title">RPGMINDEX</span>
      <span class="logo-sub" data-i18n="sub"></span>
    </div>
  </a>
  <div class="topbar-right">
    <select id="lang-select" class="lang-select" onchange="setLang(this.value)">
      <option value="en">🇺🇸 EN-US</option>
      <option value="pt" selected>🇧🇷 PT-BR</option>
    </select>
    <button class="icon-button" id="theme-toggle-button" onclick="toggleTheme()" title="Toggle theme">☀️</button>
    <button class="button-base topbar-nav-btn" id="about-btn"    onclick="navigateTo('about')"    data-i18n="aboutus"></button>
    <button class="icon-button topbar-nav-icon" id="about-icon-btn" onclick="navigateTo('about')"    title="About">ℹ️</button>
    <button class="button-base topbar-nav-btn" id="settings-btn" onclick="navigateTo('settings')" data-i18n="settings"></button>
    <button class="icon-button topbar-nav-icon" id="settings-icon-btn" onclick="navigateTo('settings')" title="Settings">⚙️</button>
  </div>
</header>

<!-- ADMIN BAR — shown on every page when admin is logged in -->
<div id="admin-bar">
  <span class="admin-bar-left">
    🔐 <span data-i18n="adminmode"></span>
    · <strong id="admin-username-label"></strong>
    · <span id="admin-role-label" class="admin-role-pill"></span>
  </span>
  <div class="admin-bar-right">
    <button data-i18n="addgame" onclick="openEdit(null)"></button>
    <button data-i18n="logout"  onclick="doLogout()"></button>
  </div>
</div>

<!-- WARNING DIV — visible on any page when pending actions exist -->
<div id="warning-div" style="display:none">
  <div class="warning-header">
    <span class="warning-title">⚠️ <span data-i18n="pendingactions"></span></span>
    <button id="warning-toggle-btn" onclick="toggleWarningExpand()">▾</button>
  </div>
  <div id="warning-actions-list"></div>
</div>

<!-- ═══════════════════════════════ PAGE: GAMES ═══════════════════════════════ -->
<main id="page-games">

  <div class="control-bar">
    <div class="control-left">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search" type="search" data-i18n-ph="search" oninput="onSearch(this.value)">
      </div>
      <button class="button-base" id="advanced-search-button" onclick="toggleAdvancedSearch()"></button>
      <div class="sort-control" id="control-sort-wrapper">
        <span class="sort-prefix" data-i18n="sortby"></span>
        <select id="cards-sort" onchange="onCardSort(this.value)">
          <option value="title">Título A→Z</option>
          <option value="title-d">Título Z→A</option>
          <option value="year">Ano ↑</option>
          <option value="year-d">Ano ↓</option>
          <option value="developer">Dev A→Z</option>
        </select>
      </div>
    </div>
    <div class="control-right">
      <div class="columns-wrapper" id="columns-wrapper-el">
        <button class="button-base" id="columns-button" onclick="toggleColumnsMenu()"></button>
        <div class="columns-menu" id="columns-menu"></div>
      </div>
      <div class="view-toggle">
        <button class="on" data-i18n="compact" id="view-compact" onclick="setView('compact')"></button>
        <button data-i18n="cards"   id="view-cards"   onclick="setView('cards')"></button>
      </div>
    </div>
  </div>

  <div class="advanced-panel" id="advanced-panel">
    <div class="advanced-panel-header">
      <span class="advanced-panel-title" data-i18n="advsearch"></span>
      <button class="advanced-panel-close" onclick="tryCloseAdvanced()">✕</button>
    </div>
    <div class="advanced-panel-body">
      <div class="adv-control" id="ecb-version">
        <div class="ecb-wrapper">
          <input type="text" class="ecb-input" id="ecb-version-input" placeholder="Filter versions…"
                 oninput="filterAdvancedEcb('version',this.value)" onfocus="openAdvancedEcb('version')" autocomplete="off"/>
          <div class="ecb-dropdown" id="ecb-version-dropdown"></div>
        </div>
      </div>
      <div class="adv-control" id="ecb-country">
        <div class="ecb-wrapper">
          <input type="text" class="ecb-input" id="ecb-country-input" placeholder="Filter countries…"
                 oninput="filterAdvancedEcb('country',this.value)" onfocus="openAdvancedEcb('country')" autocomplete="off"/>
          <div class="ecb-dropdown" id="ecb-country-dropdown"></div>
        </div>
      </div>
      <div class="adv-control adv-control-tags">
        <div class="adv-tags-row">
          <div class="ecb-wrapper" id="ecb-tags">
            <input type="text" class="ecb-input" id="ecb-tags-input" placeholder="Filter tags…"
                   oninput="filterAdvancedEcb('tags',this.value)" onfocus="openAdvancedEcb('tags')" autocomplete="off"/>
            <div class="ecb-dropdown" id="ecb-tags-dropdown"></div>
          </div>
          <div class="mode-toggle">
            <button id="adv-mode-or"  onclick="setTagMode('or')">OR</button>
            <button id="adv-mode-and" class="on" onclick="setTagMode('and')">AND</button>
          </div>
          <span class="label-pill label-pill-tagsonly" data-i18n="tagsonly"></span>
        </div>
        <div class="adv-tags-row" style="margin-top:6px">
          <div class="ecb-wrapper" id="ecb-blacklist">
            <input type="text" class="ecb-input ecb-input-blacklist" id="ecb-blacklist-input" placeholder="Exclude tags…"
                   oninput="filterAdvancedEcb('blacklist',this.value)" onfocus="openAdvancedEcb('blacklist')" autocomplete="off"/>
            <div class="ecb-dropdown" id="ecb-blacklist-dropdown"></div>
          </div>
        </div>
      </div>
      <div class="adv-control" id="ecb-fanLang">
        <div class="ecb-wrapper">
          <input type="text" class="ecb-input" id="ecb-fanLang-input" placeholder="Filter languages…"
                 oninput="filterAdvancedEcb('fanLang',this.value)" onfocus="openAdvancedEcb('fanLang')" autocomplete="off"/>
          <div class="ecb-dropdown" id="ecb-fanLang-dropdown"></div>
        </div>
      </div>
      <div class="adv-control adv-control-clear">
        <button class="clear-button" data-i18n="clearall" onclick="clearAdvancedFilters()"></button>
      </div>
    </div>
    <div class="advanced-chips-row" id="advanced-chips-row" style="display:none"></div>
  </div>

  <div id="dev-panel" style="display:none"></div>
  <div class="results-count" id="results-count"></div>

  <div id="table-view">
    <div class="table-wrapper"><div class="table-scroll">
      <table>
        <thead><tr id="table-header-row"></tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div></div>
  </div>

  <div id="cards-view">
    <div class="cards-toolbar">
      <div class="sort-control" style="flex:1">
        <span class="sort-prefix" data-i18n="sortby"></span>
        <select id="cards-sort-mobile" onchange="onCardSort(this.value)" style="flex:1">
          <option value="title">Título A→Z</option>
          <option value="title-d">Título Z→A</option>
          <option value="year">Ano ↑</option>
          <option value="year-d">Ano ↓</option>
          <option value="developer">Dev A→Z</option>
        </select>
      </div>
    </div>
    <div class="cards-grid" id="cards-grid"></div>
  </div>

</main>

<!-- ═══════════════════════════════ PAGE: ABOUT ═══════════════════════════════ -->
<section id="page-about" style="display:none">
  <div class="page-content-wrap">
    <div class="page-card about-card">
      <div class="about-main">
        <div class="about-text">
          <h1 class="about-title" data-i18n="abouttitle"></h1>
          <p data-i18n="aboutdesc"></p>
        </div>
        <div class="about-contact">
          <h2 class="about-contact-title" data-i18n="contacttitle"></h2>
          <p data-i18n="contactsub"></p>
          <div class="field"><input id="contact-name"  type="text"  data-i18n-ph="contactname"/></div>
          <div class="field"><input id="contact-email" type="email" data-i18n-ph="contactemail"/></div>
          <div class="field"><textarea id="contact-message" data-i18n-ph="contactmsg"></textarea></div>
          <button class="button-primary" data-i18n="contactsend" onclick="sendContact()"></button>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ═══════════════════════════════ PAGE: SETTINGS ════════════════════════════ -->
<section id="page-settings" style="display:none">
  <div class="page-content-wrap">
    <div class="page-card" id="settings-content">
      <!-- Rendered by renderSettingsPage() -->
    </div>
  </div>
</section>

<!-- ══════════════════════════════════ TOOLTIP ════════════════════════════════ -->
<div id="tooltip">
  <img id="tooltip-image" src="" alt=""/>
  <div class="tooltip-fallback" data-i18n="noss" id="tooltip-fallback"></div>
  <div id="tooltip-title"></div>
</div>

<!-- ══════════════════════════════════ MODALS ═════════════════════════════════ -->

<div class="modal-overlay" id="game-detail-modal">
  <div class="modal-content game-detail-content">
    <button class="game-detail-close" onclick="closeModal('game-detail-modal');S.activeModalGameId=null">×</button>
    <div class="game-detail-screenshot-wrap">
      <img id="game-detail-screenshot" src="" alt=""/>
      <div id="game-detail-screenshot-fallback"></div>
    </div>
    <div class="game-detail-body">
      <div class="game-detail-header">
        <div class="game-detail-title" id="game-detail-title"></div>
        <div class="game-detail-id"    id="game-detail-id"></div>
      </div>
      <div id="game-detail-meta"></div>
      <div id="game-detail-tags"></div>
      <div class="game-detail-footer" id="game-detail-footer"></div>
    </div>
  </div>
</div>

<div class="modal-overlay no-click-close" id="confirm-clear-modal">
  <div class="modal-content">
    <div class="modal-title"    data-i18n="confirmclear"></div>
    <div class="modal-subtitle" data-i18n="confirmclearsub"></div>
    <div class="modal-actions">
      <button class="button-secondary" data-i18n="confirmkeep"     onclick="keepAndClose()"></button>
      <button class="button-primary"   data-i18n="confirmclearbtn" onclick="confirmClearClose()"></button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="login-modal">
  <div class="modal-content">
    <div class="modal-title"    data-i18n="adminlogin"></div>
    <div class="modal-subtitle" data-i18n="adminsub"></div>
    <div class="field"><input id="login-email"    type="email"    placeholder="admin@example.com" title="Email"/></div>
    <div class="field"><input id="login-password" type="password" placeholder="Password"          title="Password"/></div>
    <div class="modal-actions">
      <button class="button-secondary" data-i18n="cancel" onclick="closeModal('login-modal')"></button>
      <button class="button-primary"   data-i18n="login"  onclick="doLogin()"></button>
    </div>
    <div class="login-error" id="login-error">Credenciais inválidas.</div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal-content large">
    <div class="modal-title" id="edit-modal-title"></div>
    <input type="hidden" id="edit-game-id"/>
    <div class="field-row">
      <div class="field">
        <input id="edit-game-title" type="text" placeholder="Título" title="Título"/>
        <div class="login-error" id="edit-title-error" style="display:none"></div>
      </div>
      <div class="field">
        <input id="edit-game-developer" type="text" list="developer-list"
               placeholder="Desenvolvedor" title="Desenvolvedor" autocomplete="off"/>
        <datalist id="developer-list"></datalist>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><select id="edit-game-version" title="Versão RPG Maker"></select></div>
      <div class="field">
        <input id="edit-game-year" type="number" min="1900" max="2099" placeholder="Ano" title="Ano"
               oninput="if(this.value.length>4)this.value=this.value.slice(0,4)"/>
        <div class="login-error" id="edit-year-error" style="display:none"></div>
      </div>
    </div>
    <div class="field">
      <input id="edit-game-country" type="text" list="country-datalist"
             data-i18n-ph="countryph" autocomplete="off" title="País de Origem"/>
      <datalist id="country-datalist"></datalist>
    </div>
    <hr class="field-divider"/>
    <div class="field">
      <div class="screenshot-field">
        <input id="edit-screenshot-url" type="url" placeholder="Screenshot URL…" title="Screenshot URL"/>
        <button type="button" class="button-base" id="screenshot-upload-btn" onclick="triggerScreenshotUpload()"></button>
        <input type="file" id="edit-screenshot-file-input" accept="image/*" style="display:none"
               onchange="handleScreenshotFile(this)"/>
      </div>
    </div>
    <div class="field">
      <div class="download-options">
        <div class="download-option">
          <input type="radio" name="download-type" id="download-available"   value="available" onchange="toggleDownloadField()" checked/>
          <label for="download-available"   data-i18n="avail"></label>
        </div>
        <div class="download-option">
          <input type="radio" name="download-type" id="download-unavailable" value="na"        onchange="toggleDownloadField()"/>
          <label for="download-unavailable" id="lost-media-label" data-i18n="na2"></label>
        </div>
      </div>
      <div id="download-available-fields">
        <input id="edit-download-url"  type="url" data-i18n-ph="sourceph"      style="margin-top:6px" title="Source URL"/>
        <div class="login-error" id="edit-source-error"  style="display:none"></div>
        <input id="edit-archive-url"   type="url" data-i18n-ph="archiveph"     style="margin-top:6px" title="Archive URL"/>
        <div class="login-error" id="edit-archive-error" style="display:none"></div>
      </div>
      <div id="download-lost-fields" style="display:none">
        <input id="edit-proof-url"         type="url" data-i18n-ph="proofph"       style="margin-top:6px" title="Proof URL"
               oninput="updateLostMediaLabelStyle()"/>
        <input id="edit-lost-archive-url"  type="url" data-i18n-ph="lostarchiveph" style="margin-top:6px" title="Archive.org URL"/>
        <div class="login-error" id="edit-lost-archive-error" style="display:none"></div>
      </div>
    </div>
    <hr class="field-divider"/>
    <div class="field-row">
      <div class="field">
        <input id="edit-fan-lang" type="text" list="fanlang-datalist"
               data-i18n-ph="fanLangph" autocomplete="off" title="Fan-translation language"/>
        <datalist id="fanlang-datalist"></datalist>
      </div>
      <div class="field">
        <input id="edit-fan-dev" type="text" data-i18n-ph="fanDevph" title="Fan-translation developer"/>
        <div class="login-error" id="edit-fandev-error" style="display:none"></div>
      </div>
    </div>
    <hr class="field-divider"/>
    <div class="field">
      <div class="edit-tag-ms" id="edit-tag-ms">
        <div class="edit-tag-input-row">
          <input type="text" id="edit-tag-input" data-i18n-ph="tagph"
                 oninput="onEditTagInput(this.value)" onkeydown="onEditTagKeydown(event)"
                 onfocus="renderEditTagDropdown(editForm.tagFilter)" autocomplete="off" title="Tags"/>
          <span class="ms-arrow" onclick="toggleEditTagDropdown()" style="cursor:pointer;padding:0 4px">▾</span>
        </div>
        <div class="ecb-dropdown" id="edit-tag-dropdown"></div>
        <div class="edit-tag-chips" id="edit-tag-chips"></div>
      </div>
      <div class="login-error" data-i18n="tagsrequired" id="edit-tag-error" style="display:none"></div>
    </div>
    <div class="modal-actions">
      <button class="button-secondary" data-i18n="cancel" onclick="closeModal('edit-modal')"></button>
      <button class="button-primary"   data-i18n="save"   onclick="saveGame()"></button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="manage-versions-modal">
  <div class="modal-content large">
    <div class="modal-title" data-i18n="managever"></div>
    <div class="manage-add-row">
      <input id="new-ver-name" class="manage-input" placeholder="RPG Maker MZ" style="flex:1"/>
      <button class="button-primary" onclick="addVersion()" data-i18n="addversion"></button>
    </div>
    <hr class="field-divider"/>
    <div id="versions-list" class="manage-list"></div>
    <div class="modal-actions">
      <button class="button-secondary" data-i18n="cancel" onclick="closeModal('manage-versions-modal')"></button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="manage-tags-modal">
  <div class="modal-content large">
    <div class="modal-title" data-i18n="managetags"></div>
    <input class="manage-input" style="width:100%;margin-bottom:8px"
           data-i18n-ph="filtertagsmanager" oninput="filterTagsList(this.value)"/>
    <hr class="field-divider"/>
    <div id="tags-list" class="manage-list"></div>
    <div class="modal-actions">
      <button class="button-secondary" data-i18n="cancel" onclick="closeModal('manage-tags-modal')"></button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="manage-users-modal">
  <div class="modal-content large">
    <div class="modal-title" data-i18n="manageusers"></div>
    <input class="manage-input" style="width:100%;margin-bottom:8px"
           placeholder="Filter users…" oninput="filterUsersList(this.value)"/>
    <hr class="field-divider"/>
    <div id="users-list" class="manage-list"></div>
    <div class="modal-actions">
      <button class="button-secondary" data-i18n="cancel" onclick="closeModal('manage-users-modal')"></button>
    </div>
  </div>
</div>

<!-- Script load order: supabase → data → state → i18n → helpers → render → admin → ui → app-core → app-games -->
<script src="js/supabase-client.js"></script>
<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/i18n.js"></script>
<script src="js/helpers.js"></script>
<script src="js/render.js"></script>
<script src="js/admin.js"></script>
<script src="js/ui.js"></script>
<script src="js/app-core.js"></script>
<script src="js/app-games.js"></script>

</body>
</html>
